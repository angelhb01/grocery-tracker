name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      # Public keys (safe to expose to client if needed)
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      # Sensitive keys (must stay secret)
      SUPABASE_SERVICE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
      SUPABASE_DATABASE_PASSWORD: ${{ secrets.SUPABASE_DATABASE_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:

      # Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Install Expo CLI and EAS CLI globally
      - name: Install Expo and EAS CLI
        run: npm install -g expo-cli eas-cli
      
      # Links to Supabase Project
      - name: Link Supabase project
        run: npx supabase link --project-ref $SUPABASE_PROJECT_ID

      # Run Supabase migrations (applies your database schema)
      - name: Run Supabase migrations
        run: npx supabase db push

      # Publish an update to Expo Go
      - name: Publish Update
        run: npx eas update --auto --non-interactive

      # Create server bundle
      - name: Create server bundle
        run: npx expo export --platform web
      
      # Setup EAS hosting
      - name: Setup EAS hosting
        run: npx expo export -p web
      
      # Deploy app to EAS
      - name: Deploy app to EAS
        run: eas deploy --prod